<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${diary == null} ? 'Новый дневник' : 'Редактирование дневника'"></title>
</head>
<body>
<th:block th:fragment="content">
    <h2 th:text="${diary == null} ? 'Создать дневник' : 'Редактировать дневник'"></h2>
    <form method="post"
          th:action="${diary == null} ? @{/diaries} : @{/diaries/{id}(id=${diary.id})}">
        <input type="text" name="diaryname" placeholder="Название дневника"
               th:value="${diary?.diaryname}" required>
        <br><br>
        <button type="submit">Сохранить</button>
        <a th:href="${diary == null} ? @{/diaries} : @{/diaries/{id}(id=${diary.id})}">Отмена</a>
    </form>
</th:block>
</body>
</html>
