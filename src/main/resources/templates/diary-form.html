<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::content})}">
<head>
    <meta charset="UTF-8">
    <title th:text="${diary == null} ? 'Новый дневник' : 'Редактирование'"></title>
</head>
<body>
<th:block th:fragment="content">
    <div class="card">
        <h2 th:text="${diary == null} ? 'Создать дневник' : 'Редактировать дневник'"></h2>
        <form method="post"
              th:action="${diary == null} ? @{/diaries} : @{/diaries/{id}(id=${diary.id})}">
            <div class="form-group">
                <input type="text" name="diaryname" placeholder="Название"
                       th:value="${diary?.diaryname}" required>
            </div>
            <button type="submit" class="btn">Сохранить</button>
            <a th:href="${diary == null} ? @{/diaries} : @{/diaries/{id}(id=${diary.id})}" class="btn" style="background:#555;">Отмена</a>
        </form>
    </div>
</th:block>
</body>
</html>
