<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::content})}">
<head>
    <meta charset="UTF-8">
    <title>Дневники</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="card">
        <h2>Все дневники</h2>
        <a th:href="@{/diaries/new}" class="btn" style="margin-bottom:15px;">Создать новый дневник</a>
        <table th:if="${!diaries.isEmpty()}">
            <tr><th>Название</th><th>Автор</th><th>Дата создания</th><th></th></tr>
            <tr th:each="d : ${diaries}">
                <td><a th:href="@{/diaries/{id}(id=${d.id})}" class="link" th:text="${d.diaryname}"></a></td>
                <td th:text="${d.user.username}"></td>
                <td th:text="${#temporals.format(d.created, 'dd.MM.yyyy')}"></td>
                <td>
                    <th:block th:if="${currentUser.id == d.user.id}">
                        <a th:href="@{/diaries/{id}/edit(id=${d.id})}" class="btn">Ред.</a>
                        <form th:action="@{/diaries/{id}/delete(id=${d.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Удалить дневник?')">Удалить</button>
                        </form>
                    </th:block>
                </td>
            </tr>
        </table>
        <div th:if="${diaries.isEmpty()}">Дневников пока нет.</div>
    </div>
</th:block>
</body>
</html>
