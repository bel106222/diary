<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #eee;
        }

        .login-container {
            background: #16213e;
            border: 1px solid #1b3b5c;
            border-radius: 16px;
            padding: 40px 30px;
            width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-container h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #4da8da;
            letter-spacing: 1px;
        }

        .login-container h2 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 300;
            color: #a6a9b6;
        }

        .error-message {
            color: #4da8da;
            background: rgba(77, 168, 218, 0.1);
            border: 1px solid #4da8da;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f3460;
            border: 1px solid #1b3b5c;
            border-radius: 10px;
            color: #eee;
            font-size: 1rem;
            transition: border 0.3s, background 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4da8da;
            background: #1a1a2e;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #4da8da;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-login:hover {
            background: #3b8bbf;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .register-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #a6a9b6;
        }

        .register-link a {
            color: #4da8da;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>ОНЛАЙНОВЫЙ ДНЕВНИК</h1>
    <h2>Вход в систему</h2>
    <div th:if="${error}" class="error-message" th:text="${error}"></div>
    <form method="post" th:action="@{/login}">
        <div class="input-group">
            <input type="text" name="username" placeholder="Логин" required autocomplete="username">
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Войти</button>
    </form>
    <p class="register-link">Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a></p>
</div>
</body>
</html>
