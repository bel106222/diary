<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::content})}">
<head>
    <meta charset="UTF-8">
    <title>Запись</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="card">
        <h2>Запись</h2>
        <p style="color:#a6a9b6;"><strong>Автор:</strong> <span th:text="${record.user.username}"></span></p>
        <p style="color:#a6a9b6;"><strong>Дневник:</strong> <span th:text="${record.diary.diaryname}"></span></p>
        <p style="color:#a6a9b6;"><strong>Дата:</strong> <span th:text="${#temporals.format(record.created, 'dd.MM.yyyy HH:mm')}"></span></p>
        <p style="color:#a6a9b6; margin-top:15px;"><strong>Описание:</strong></p>
        <div style="white-space: pre-wrap; background:#0f3460; padding:15px; border-radius:10px; margin:10px 0;" th:text="${record.recorddescription}"></div>

        <h3 style="color:#4da8da; margin-top:20px;">Прикреплённые файлы</h3>
        <ul style="list-style:none; padding-left:0;">
            <li th:each="file : ${record.files}" style="margin:5px 0;">
                <a th:href="@{/files/{name}(name=${file.filepath})}" th:text="${file.filepath}" class="link" target="_blank"></a>
            </li>
        </ul>
        <div th:if="${record.files.isEmpty()}">Нет файлов.</div>

        <div th:if="${isAuthor}" style="margin-top:20px;">
            <a th:href="@{/diaries/{did}/records/{rid}/edit(did=${record.diary.id}, rid=${record.id})}" class="btn">Редактировать</a>
            <form th:action="@{/diaries/{did}/records/{rid}/delete(did=${record.diary.id}, rid=${record.id})}"
                  method="post" style="display:inline">
                <button type="submit" class="btn btn-danger" onclick="return confirm('Удалить запись?')">Удалить</button>
            </form>
        </div>
        <br>
        <a th:href="@{/diaries/{id}(id=${record.diary.id})}" class="link">Назад к дневнику</a>
    </div>
</th:block>
</body>
</html>
