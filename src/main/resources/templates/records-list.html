<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::content})}">
      <!-- Ключевой механизм. Вместо того чтобы рендерить этот <html>, шаблонизатор возьмёт
      макет fragments/layout.html и вставит в его область ${content} фрагмент с именем content,
      определённый ниже в этом файле. Это позволяет всем страницам иметь общую шапку, поиск и
      навигацию без дублирования кода.-->
<head>
    <meta charset="UTF-8">
    <title>Все записи</title>
</head>
<body>

<!-- Объявляем фрагмент content, который передаётся в макет. Сам th:block в итоговом HTML не виден – это логическая обёртка.-->
<th:block th:fragment="content">
    <div class="card">

        <!-- Заголовок – развилка «Все записи» / «Результаты поиска»
        Первый <h2> срабатывает, только если атрибут searchQuery не был передан в модель
        (или равен null). Это соответствует главной странице (/ или /records).
        Второй <h2> активен, когда есть поисковый запрос (/records/search?query=...).
        В этом случае заголовок динамически показывает искомую фразу.
        <span th:text="${searchQuery}"> вставляет текст запроса с экранированием (защита от XSS).
        Обрамление кавычками-ёлочками («») – для визуального выделения.
        Каждая ветка срабатывает только при своём условии, не создавая лишних элементов. -->
        <h2 th:if="${searchQuery == null}">Все записи</h2>
        <h2 th:if="${searchQuery != null}">Результаты поиска: «<span th:text="${searchQuery}"></span>»</h2>

        <!-- Сообщение о пустом списке.
        th:if="${records.isEmpty()}" – вызывается метод isEmpty() у списка записей. Если записей
        нет, показывается это сообщение. Оно выводится и при обычном просмотре,
        и при поиске, когда ничего не найдено и пользователь не видит пустую таблицу.-->
        <div th:if="${records.isEmpty()}">Записей не найдено.</div>

        <!-- таблица рендерится, только если список не пуст-->
        <table th:if="${!records.isEmpty()}">
            <tr><th>Дата</th><th>Автор</th><th>Дневник</th><th>Описание</th><th></th></tr>

            <!-- итерируемся по списку records, переданному из контроллера. На каждом шаге
            текущий объект Record доступен как rec.-->
            <tr th:each="rec : ${records}">

                <!-- форматируем LocalDateTime в читаемую строку: день, месяц, год, часы и минуты.-->
                <td th:text="${#temporals.format(rec.created, 'dd.MM.yyyy HH:mm')}"></td>

                <!-- здесь Thymeleaf проходит по связям JPA: из записи (Record) берёт автора (User), а затем его имя.-->
                <td th:text="${rec.user.username}"></td>

                <!-- аналогично, но отображает название дневника, в котором находится запись. Связь Record -> Diary.-->
                <td th:text="${rec.diary.diaryname}"></td>

                <!-- используем встроенную функцию Thymeleaf, которая обрезает текст до заданной
                длины (80 символов) и добавляет многоточие, если текст длиннее. Это нужно, чтобы
                строка таблицы не растягивалась из-за длинных описаний, сохраняя компактность.
                Если описание короче 80 символов, оно отображается полностью.-->
                <td th:text="${#strings.abbreviate(rec.recorddescription, 80)}"></td>

                <!-- th:href с шаблоном URL. Используются плейсхолдеры {did} и {rid},
                которые заменяются значениями из переменных: did=${rec.diary.id} и
                rid=${rec.id}. В итоге получается ссылка вида /diaries/5/records/12.
                Это стандартный способ построения параметризованных URL в Thymeleaf,
                обеспечивающий корректную обработку контекстного пути и экранирование
                символов. Такое решение даёт детальный просмотр записи внутри
                конкретного дневника. Структура URL отражает иерархию: дневник -> запись.-->
                <td><a th:href="@{/diaries/{did}/records/{rid}(did=${rec.diary.id}, rid=${rec.id})}" class="link">Открыть</a></td>
            </tr>
        </table>
    </div>
</th:block>
</body>
</html>
