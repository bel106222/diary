<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::content})}">
<head>
    <meta charset="UTF-8">
    <title>Все записи</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="card">
        <h2 th:if="${searchQuery == null}">Все записи</h2>
        <h2 th:if="${searchQuery != null}">Результаты поиска: «<span th:text="${searchQuery}"></span>»</h2>
        <div th:if="${records.isEmpty()}">Записей не найдено.</div>
        <table th:if="${!records.isEmpty()}">
            <tr><th>Дата</th><th>Автор</th><th>Дневник</th><th>Описание</th><th></th></tr>
            <tr th:each="rec : ${records}">
                <td th:text="${#temporals.format(rec.created, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${rec.user.username}"></td>
                <td th:text="${rec.diary.diaryname}"></td>
                <td th:text="${#strings.abbreviate(rec.recorddescription, 80)}"></td>
                <td><a th:href="@{/diaries/{did}/records/{rid}(did=${rec.diary.id}, rid=${rec.id})}" class="link">Открыть</a></td>
            </tr>
        </table>
    </div>
</th:block>
</body>
</html>
