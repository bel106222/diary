<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .reg-container {
            background: #16213e;
            border: 1px solid #1b3b5c;
            border-radius: 16px;
            padding: 40px 30px;
            width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin: 80px auto;
        }
        .reg-container h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #4da8da;
        }
        .reg-container h2 {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 300;
            color: #a6a9b6;
        }
    </style>
</head>
<body>
<div class="reg-container">
    <h1>ОНЛАЙНОВЫЙ ДНЕВНИК</h1>
    <h2>Регистрация</h2>
    <div th:if="${error}" class="error-msg" th:text="${error}"></div>
    <form method="post" th:action="@{/register}">
        <div class="form-group">
            <input type="text" name="username" placeholder="Логин" required>
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Пароль" required>
        </div>
        <button type="submit" class="btn" style="width:100%">Зарегистрироваться</button>
    </form>
    <p style="margin-top:20px; color:#a6a9b6;">Уже есть аккаунт? <a th:href="@{/login}" class="link">Войти</a></p>
</div>
</body>
</html>
