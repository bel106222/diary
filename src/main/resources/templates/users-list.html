<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::content})}">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="card">
        <h2>Все пользователи</h2>
        <table>
            <tr><th>Логин</th><th>Email</th><th>Зарегистрирован</th></tr>
            <tr th:each="u : ${users}">
                <td th:text="${u.username}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${#temporals.format(u.created, 'dd.MM.yyyy')}"></td>
            </tr>
        </table>
    </div>
</th:block>
</body>
</html>
